<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SCMS Staff Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#7c839b",
                        "tertiary-container": "#001a42",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-tertiary-fixed": "#001a42",
                        "surface-container-low": "#f2f4f6",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#006a61",
                        "on-tertiary-fixed-variant": "#004395",
                        "inverse-surface": "#2d3133",
                        "tertiary": "#000000",
                        "on-secondary-fixed": "#00201d",
                        "secondary-container": "#86f2e4",
                        "on-secondary": "#ffffff",
                        "background": "#f7f9fb",
                        "on-surface-variant": "#45464d",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-primary-fixed": "#131b2e",
                        "on-background": "#191c1e",
                        "on-secondary-fixed-variant": "#005049",
                        "surface-container": "#eceef0",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#006f66",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-fixed-dim": "#adc6ff",
                        "surface-dim": "#d8dadc",
                        "surface-tint": "#565e74",
                        "primary-fixed-dim": "#bec6e0",
                        "secondary-fixed-dim": "#6bd8cb",
                        "surface-bright": "#f7f9fb",
                        "error": "#ba1a1a",
                        "primary-fixed": "#dae2fd",
                        "surface-container-high": "#e6e8ea",
                        "inverse-primary": "#bec6e0",
                        "secondary-fixed": "#89f5e7",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-container": "#3980f4",
                        "tertiary-fixed": "#d8e2ff",
                        "primary-container": "#131b2e",
                        "outline": "#76777d",
                        "outline-variant": "#c6c6cd",
                        "surface": "#f7f9fb",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e0e3e5",
                        "primary": "#000000"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "gutter": "16px",
                        "xs": "8px",
                        "lg": "24px",
                        "xl": "32px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "sm": "12px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "status-label": ["Inter"],

                }
            }
        }

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .bg-pattern {
            background-color: #f7f9fb;
            background-image: radial-gradient(#e0e3e5 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-lg min-h-screen flex items-center justify-center bg-pattern p-margin-mobile md:p-margin-desktop">
<!-- Transactional Screen: Navigation Suppressed -->
<main class="w-full max-w-md mx-auto">
<!-- Back Button Area -->
<div class="mb-lg">
<a class="inline-flex items-center text-on-surface-variant hover:text-primary transition-colors gap-xs" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
<span class="font-body-lg text-body-lg">Role Selection</span>
</a>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-lg md:p-xl">
<!-- Header -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container text-on-primary mb-lg">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-xs">SCMS Admin</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Secure Staff Access Portal</p>
</div>
<!-- Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Email Input -->
<div>
<label class="block font-title-md text-title-md text-on-surface mb-xs" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface text-on-surface placeholder-on-surface-variant focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow" id="email" name="email" placeholder="admin@scms.local" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-xs">
<label class="block font-title-md text-title-md text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-on-tertiary-container hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-lg bg-surface text-on-surface placeholder-on-surface-variant focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-on-surface-variant hover:text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</div>
</div>
</div>
<!-- Remember Me (Optional structural addition for standard login) -->
<div class="flex items-center">
<input class="h-4 w-4 text-secondary focus:ring-secondary border-outline-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                        Remember this device
                    </label>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-title-md text-title-md text-on-tertiary bg-tertiary-container hover:bg-on-tertiary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-colors h-[48px] items-center" type="submit">
                        Login
                    </button>
</div>
</form>
<!-- Footer Meta -->
<div class="mt-lg pt-lg border-t border-surface-variant text-center">
<p class="font-body-sm text-body-sm text-outline flex items-center justify-center gap-base">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">info</span>
                    Authorized personnel only. All access is logged.
                </p>
</div>
</div>
</main>
</body></html>
